<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset your password | Sunday</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#453d36",
                        "on-error-container": "#93000a",
                        "on-surface": "#191c1e",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#bec6df",
                        "surface-bright": "#f7f9fb",
                        "on-primary-fixed": "#131b2e",
                        "on-primary-fixed-variant": "#3e465b",
                        "primary-fixed": "#dae2fc",
                        "on-secondary-fixed-variant": "#3e465c",
                        "secondary-fixed": "#dae2fd",
                        "surface-container-low": "#f2f4f6",
                        "on-primary": "#ffffff",
                        "primary": "#363e52",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c6c6cd",
                        "surface-tint": "#565e73",
                        "on-tertiary-fixed-variant": "#4e453e",
                        "on-secondary-container": "#5c647b",
                        "inverse-surface": "#2d3133",
                        "tertiary-fixed": "#eee0d7",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-tertiary-container": "#d6c9bf",
                        "surface": "#f7f9fb",
                        "background": "#f7f9fb",
                        "on-tertiary-fixed": "#211a15",
                        "on-background": "#191c1e",
                        "primary-container": "#4d556a",
                        "on-surface-variant": "#45464c",
                        "tertiary-fixed-dim": "#d1c4bb",
                        "secondary-fixed-dim": "#bec6e0",
                        "outline": "#76777d",
                        "on-error": "#ffffff",
                        "surface-variant": "#e0e3e5",
                        "on-primary-container": "#c2cae3",
                        "tertiary-container": "#5d544d",
                        "surface-container": "#eceef0",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container-high": "#e6e8ea",
                        "on-secondary-fixed": "#131b2e",
                        "surface-dim": "#d8dadc",
                        "secondary": "#565e74",
                        "secondary-container": "#dae2fd",
                        "primary-fixed-dim": "#bec6df"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f7f9fb;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #4d556a 0%, #656d84 100%);
        }
        .glass-overlay {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-surface">
<!-- Logo Branding -->
<div class="mb-12 flex flex-col items-center">
<div class="w-12 h-12 rounded-2xl signature-gradient flex items-center justify-center shadow-[0px_12px_24px_rgba(77,85,106,0.15)] mb-4">
<span class="material-symbols-outlined text-white text-2xl" data-icon="hub">hub</span>
</div>
<h2 class="text-xl font-bold tracking-tighter text-on-surface">Sunday</h2>
</div>
<!-- Auth Card Container -->
<main class="w-full max-w-[440px]">
<!-- RESET FORM STATE (Default visible) -->
<div class="bg-surface-container-lowest p-10 md:p-12 rounded-xl shadow-[0px_24px_48px_rgba(77,85,106,0.06)] relative overflow-hidden group" id="reset-form">
<!-- Decorative soft element -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
<header class="mb-10 text-center">
<h1 class="text-2xl md:text-3xl font-bold tracking-[-0.02em] text-on-surface mb-3">Reset your password</h1>
<p class="text-on-surface-variant text-sm leading-relaxed">
                    Enter your work email address and we'll send you a link to reset your password.
                </p>
</header>
<form class="space-y-6">
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-4" for="email">Work Email</label>
<input class="w-full h-14 px-6 rounded-full bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/20 text-on-surface placeholder:text-outline/60 transition-all text-sm" id="email" placeholder="name@company.com" type="email"/>
</div>
<button class="w-full h-14 rounded-full signature-gradient text-white font-semibold text-sm shadow-[0px_8px_16px_rgba(77,85,106,0.2)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
                    Send reset link
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<footer class="mt-10 text-center">
<a class="text-sm font-medium text-primary hover:text-primary-container transition-colors inline-flex items-center gap-2" href="/login">
<span class="material-symbols-outlined text-base" data-icon="arrow_back">arrow_back</span>
                    Back to sign in
                </a>
</footer>
</div>
<!-- SUCCESS STATE (Hidden by default, used for visual demonstration) -->
<!-- In a real app, this would be toggled via JS or routed. Here it's provided as a reference/preview pattern. -->
<div class="mt-12 bg-surface-container-lowest p-10 md:p-12 rounded-xl shadow-[0px_24px_48px_rgba(77,85,106,0.06)] relative overflow-hidden border-none hidden" id="success-state">
<div class="flex flex-col items-center text-center">
<div class="w-16 h-16 rounded-full bg-tertiary-fixed flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-tertiary text-3xl" data-icon="mail" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mail</span>
</div>
<h1 class="text-2xl md:text-3xl font-bold tracking-[-0.02em] text-on-surface mb-3">Check your inbox</h1>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-[280px]">
                    If that email is registered with a Sunday account, you will receive a password reset link shortly.
                </p>
<div class="mt-10 pt-8 border-t border-outline-variant/10 w-full">
<p class="text-xs text-on-surface-variant/70 mb-4">Didn't receive the email?</p>
<button class="text-sm font-semibold text-primary px-6 py-2 rounded-full border border-outline-variant/30 hover:bg-surface-container-low transition-colors">
                        Resend link
                    </button>
</div>
</div>
</div>
</main>
<!-- Background Decoration (The Digital Atrium atmosphere) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[10%] left-[5%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[10%] right-[5%] w-[500px] h-[500px] bg-tertiary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Quick Toggle for demo purposes (Normally not in production) -->
<div class="fixed bottom-10 right-10 flex gap-4">
<button class="px-4 py-2 bg-white/50 backdrop-blur-md rounded-full text-[10px] font-bold uppercase tracking-widest text-on-surface-variant shadow-sm hover:bg-white transition-all" onclick="document.getElementById('reset-form').classList.toggle('hidden'); document.getElementById('success-state').classList.toggle('hidden');">
            Toggle Demo State
        </button>
</div>
</body></html>
