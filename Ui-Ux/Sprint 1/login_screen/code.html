<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#453d36",
                        "on-error-container": "#93000a",
                        "on-surface": "#191c1e",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#bec6df",
                        "surface-bright": "#f7f9fb",
                        "on-primary-fixed": "#131b2e",
                        "on-primary-fixed-variant": "#3e465b",
                        "primary-fixed": "#dae2fc",
                        "on-secondary-fixed-variant": "#3e465c",
                        "secondary-fixed": "#dae2fd",
                        "surface-container-low": "#f2f4f6",
                        "on-primary": "#ffffff",
                        "primary": "#363e52",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c6c6cd",
                        "surface-tint": "#565e73",
                        "on-tertiary-fixed-variant": "#4e453e",
                        "on-secondary-container": "#5c647b",
                        "inverse-surface": "#2d3133",
                        "tertiary-fixed": "#eee0d7",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-tertiary-container": "#d6c9bf",
                        "surface": "#f7f9fb",
                        "background": "#f7f9fb",
                        "on-tertiary-fixed": "#211a15",
                        "on-background": "#191c1e",
                        "primary-container": "#4d556a",
                        "on-surface-variant": "#45464c",
                        "tertiary-fixed-dim": "#d1c4bb",
                        "secondary-fixed-dim": "#bec6e0",
                        "outline": "#76777d",
                        "on-error": "#ffffff",
                        "surface-variant": "#e0e3e5",
                        "on-primary-container": "#c2cae3",
                        "tertiary-container": "#5d544d",
                        "surface-container": "#eceef0",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container-high": "#e6e8ea",
                        "on-secondary-fixed": "#131b2e",
                        "surface-dim": "#d8dadc",
                        "secondary": "#565e74",
                        "secondary-container": "#dae2fd",
                        "primary-fixed-dim": "#bec6df"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #4d556a 0%, #656d84 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-white">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Surface Card -->
<div class="bg-surface-container-lowest rounded-lg shadow-[0px_24px_48px_rgba(77,85,106,0.06)] p-8 md:p-12 transition-all duration-300">
<!-- Logo & Heading -->
<div class="text-center mb-10">
<div class="flex justify-center mb-6">
<span class="text-2xl font-extrabold tracking-tighter text-primary">Sunday</span>
</div>
<h1 class="text-on-surface text-2xl font-bold tracking-tight mb-2">Welcome back</h1>
<p class="text-on-surface-variant text-sm">Sign in to your account</p>
</div>
<!-- Error Banner (Conditional State) -->
<div class="mb-8 overflow-hidden rounded-md bg-surface-container-low flex items-stretch border-l-4 border-[#d0c3ba]">
<div class="p-4 flex gap-3 items-center">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="error">error</span>
<p class="text-sm text-on-surface-variant font-medium">The email or password you entered is incorrect.</p>
</div>
</div>
<!-- Form -->
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant px-1 uppercase tracking-widest" for="email">Email address</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-xl px-5 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all outline-none" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:opacity-70 transition-opacity" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-xl px-5 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary-container transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action -->
<div class="pt-4">
<button class="w-full signature-gradient text-on-primary font-semibold py-4 rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                        Sign in
                    </button>
</div>
</form>
<!-- Secondary Action -->
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant">
                    Don’t have an account? 
                    <a class="text-primary font-semibold hover:underline underline-offset-4" href="#">Request access</a>
</p>
</div>
</div>
<!-- Visual Anchor (Subtle decorative element) -->
<div class="flex justify-center gap-6 items-center opacity-40">
<div class="h-px bg-outline-variant w-12"></div>
<span class="text-[10px] uppercase tracking-[0.3em] font-bold text-on-surface-variant">The Digital Atrium</span>
<div class="h-px bg-outline-variant w-12"></div>
</div>
</main>
<!-- Background Decorative Image (Subtle) -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -right-[5%] w-[40%] h-[40%] blur-[120px] rounded-full bg-primary-fixed/30"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[40%] h-[40%] blur-[120px] rounded-full bg-tertiary-fixed/20"></div>
</div>
</body></html>
